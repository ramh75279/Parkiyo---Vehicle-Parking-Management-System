# ?????????????????????????????????????????????
# Application
# ?????????????????????????????????????????????
spring.application.name=parkiyo

# ?????????????????????????????????????????????
# Database (FIXED: removed the exclude line)
# ?????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?????????????????????????????????????????????
# JPA / Hibernate
# ?????????????????????????????????????????????
# update = keeps existing data, just adds missing tables/columns
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?????????????????????????????????????????????
# Thymeleaf
# ?????????????????????????????????????????????
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ?????????????????????????????????????????????
# Spring Security
# ?????????????????????????????????????????????
# Disable the default generated password in console (you have SecurityConfig)
spring.security.user.name=admin
spring.security.user.password=admin

# ?????????????????????????????????????????????
# File Upload (for vehicle import feature)
# ?????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?????????????????????????????????????????????
# Server
# ?????????????????????????????????????????????
server.port=8080
server.error.whitelabel.enabled=false