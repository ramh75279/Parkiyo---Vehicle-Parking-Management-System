spring.application.name=parkiyo

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${PARKIYO_DB_USERNAME:root}
spring.datasource.password=${PARKIYO_DB_PASSWORD:Parkiyo@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL init (we will control bootstrap manually)
spring.sql.init.mode=never

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ================== FILE UPLOAD ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================== SERVER ==================
server.port=8080
server.error.whitelabel.enabled=false

# App base URL (used for emails, redirects, etc.)
parkiyo.app-base-url=${PARKIYO_APP_BASE_URL:http://localhost:8080}

# ================== MAIL (SMTP) ==================
spring.mail.host=${PARKIYO_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${PARKIYO_MAIL_PORT:587}
spring.mail.username=${PARKIYO_MAIL_USERNAME:}
spring.mail.password=${PARKIYO_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
parkiyo.mail.from=${PARKIYO_MAIL_FROM:no-reply@parkiyo.com}

# ================== BOOTSTRAP (VERY IMPORTANT) ==================
# Keep bootstrap enabled so the default admin can be created on first run
parkiyo.bootstrap.enabled=true
parkiyo.bootstrap.demo-slots-enabled=false

# Admin credentials (change these before first run)
parkiyo.bootstrap.admin-email=admin@parkiyo.com
parkiyo.bootstrap.admin-password=Admin@12345
parkiyo.bootstrap.admin-first-name=Parkiyo
parkiyo.bootstrap.admin-last-name=Admin

# ================== OTHER RECOMMENDED SETTINGS ==================
# Logging
logging.level.com.parkiyo=DEBUG
logging.level.org.springframework.web=INFO

# Security
server.servlet.session.timeout=30m

# Optional: Enable this later when you add WebSocket
# spring.websocket.enabled=true