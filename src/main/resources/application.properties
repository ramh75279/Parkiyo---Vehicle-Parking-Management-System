spring.application.name=parkiyo

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${PARKIYO_DB_USERNAME:root}
spring.datasource.password=${PARKIYO_DB_PASSWORD:Parkiyo@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL init
spring.sql.init.mode=never

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ================== FILE UPLOAD (Profile Pictures + Documents) ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ================== SERVER ==================
server.port=8080
server.error.whitelabel.enabled=false
server.servlet.session.timeout=45m

# App base URL
parkiyo.app-base-url=${PARKIYO_APP_BASE_URL:http://localhost:8080}

# ================== MAIL ==================
spring.mail.host=${PARKIYO_MAIL_HOST:localhost}
spring.mail.port=${PARKIYO_MAIL_PORT:1025}
spring.mail.username=${PARKIYO_MAIL_USERNAME:}
spring.mail.password=${PARKIYO_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${PARKIYO_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${PARKIYO_MAIL_STARTTLS:true}
parkiyo.mail.from=${PARKIYO_MAIL_FROM:no-reply@parkiyo.com}

# ================== BOOTSTRAP ==================
parkiyo.bootstrap.enabled=true
parkiyo.bootstrap.demo-slots-enabled=false
parkiyo.bootstrap.admin-email=admin@parkiyo.com
parkiyo.bootstrap.admin-password=Admin@12345
parkiyo.bootstrap.admin-first-name=Parkiyo
parkiyo.bootstrap.admin-last-name=Admin

# ================== LOGGING ==================
logging.level.com.parkiyo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Security
spring.security.filter.order=1