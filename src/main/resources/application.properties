spring.application.name=parkiyo

spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${PARKIYO_DB_USERNAME:root}
spring.datasource.password=${PARKIYO_DB_PASSWORD:Parkiyo@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep runtime startup non-destructive. Reference SQL files live in src/main/resources/database.
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080
server.error.whitelabel.enabled=false

parkiyo.app-base-url=${PARKIYO_APP_BASE_URL:http://localhost:8080}

# SMTP settings. Configure these before enabling password reset email in production.
spring.mail.host=${PARKIYO_MAIL_HOST:localhost}
spring.mail.port=${PARKIYO_MAIL_PORT:25}
spring.mail.username=${PARKIYO_MAIL_USERNAME:}
spring.mail.password=${PARKIYO_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${PARKIYO_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${PARKIYO_MAIL_STARTTLS:false}
parkiyo.mail.from=${PARKIYO_MAIL_FROM:no-reply@parkiyo.com}

# First-run bootstrap. Override these before production deployment.
parkiyo.bootstrap.enabled=${PARKIYO_BOOTSTRAP_ENABLED:true}
parkiyo.bootstrap.admin-email=${PARKIYO_ADMIN_EMAIL:admin@parkiyo.com}
parkiyo.bootstrap.admin-password=${PARKIYO_ADMIN_PASSWORD:Admin@12345}
parkiyo.bootstrap.admin-first-name=${PARKIYO_ADMIN_FIRST_NAME:Parkiyo}
parkiyo.bootstrap.admin-last-name=${PARKIYO_ADMIN_LAST_NAME:Admin}
parkiyo.bootstrap.demo-slots-enabled=${PARKIYO_DEMO_SLOTS_ENABLED:true}
