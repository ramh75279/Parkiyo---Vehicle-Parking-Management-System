spring.application.name=parkiyo

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Parkiyo@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ================== SERVER ==================
server.port=8080
server.error.whitelabel.enabled=false

# ================== MAIL ==================
# Required so JavaMailSender is created at startup (password reset emails).
spring.mail.host=${PARKIYO_MAIL_HOST:localhost}
spring.mail.port=${PARKIYO_MAIL_PORT:1025}
spring.mail.username=${PARKIYO_MAIL_USERNAME:}
spring.mail.password=${PARKIYO_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${PARKIYO_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${PARKIYO_MAIL_STARTTLS:false}
parkiyo.mail.from=${PARKIYO_MAIL_FROM:no-reply@parkiyo.com}

# ================== FILE UPLOAD ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads/profiles

# App base URL
parkiyo.app-base-url=http://localhost:8080

# ================== BOOTSTRAP ==================
parkiyo.bootstrap.enabled=true
parkiyo.bootstrap.demo-slots-enabled=true
parkiyo.bootstrap.admin-email=admin@parkiyo.com
parkiyo.bootstrap.admin-password=Admin@12345
parkiyo.bootstrap.admin-first-name=Parkiyo
parkiyo.bootstrap.admin-last-name=Admin

# ================== LOGGING ==================
logging.level.com.parkiyo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Serve uploaded files
spring.web.resources.static-locations=classpath:/static/,file:./uploads/