spring.application.name=parkiyo

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Parkiyo@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ================== SERVER ==================
server.port=8080
server.error.whitelabel.enabled=false

# ================== FILE UPLOAD ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ================== APPLICATION ==================
parkiyo.app-base-url=http://localhost:8080

# ================== BOOTSTRAP ==================
parkiyo.bootstrap.enabled=true
parkiyo.bootstrap.demo-slots-enabled=false
parkiyo.bootstrap.admin-email=admin@parkiyo.com
parkiyo.bootstrap.admin-password=Admin@12345
parkiyo.bootstrap.admin-first-name=Parkiyo
parkiyo.bootstrap.admin-last-name=Admin

# ================== LOGGING ==================
logging.level.com.parkiyo=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR

# ================== SECURITY & SESSION ==================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false