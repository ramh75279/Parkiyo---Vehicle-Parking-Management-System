spring.application.name=parkiyo

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Parkiyo@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate - Production Ready Settings
spring.jpa.hibernate.ddl-auto=validate          # Change to 'validate' or use Flyway/Liquibase
spring.jpa.show-sql=false                       # Disable in production
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ================== SERVER ==================
server.port=8080
server.error.whitelabel.enabled=false
server.compression.enabled=true

# ================== MAIL (Password Reset) ==================
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
parkiyo.mail.from=${MAIL_FROM:no-reply@parkiyo.com}

# ================== FILE UPLOAD ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads

# ================== APPLICATION ==================
parkiyo.app-base-url=${APP_BASE_URL:http://localhost:8080}

# ================== BOOTSTRAP (Development Only) ==================
parkiyo.bootstrap.enabled=true
parkiyo.bootstrap.demo-slots-enabled=true
parkiyo.bootstrap.admin-email=admin@parkiyo.com
parkiyo.bootstrap.admin-password=Admin@12345
parkiyo.bootstrap.admin-first-name=Parkiyo
parkiyo.bootstrap.admin-last-name=Admin

# ================== LOGGING ==================
logging.level.com.parkiyo=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR           # Reduce noise in production

# ================== SECURITY & SESSION ==================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false      # Set true when using HTTPS

# ================== PROFILES ==================
spring.profiles.active=dev