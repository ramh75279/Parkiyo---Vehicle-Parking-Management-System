spring.application.name=parkiyo

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/parkiyo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Parkiyo@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=32

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ================== SERVER ==================
server.port=8080
server.error.whitelabel.enabled=false

# ================== FILE UPLOAD ==================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
parkiyo.upload.dir=C:/parkiyo-uploads

# ================== APPLICATION ==================
parkiyo.app-base-url=http://localhost:8080

# ================== BOOTSTRAP ==================
parkiyo.bootstrap.enabled=true
parkiyo.bootstrap.demo-slots-enabled=false
parkiyo.bootstrap.admin-email=admin@parkiyo.com
parkiyo.bootstrap.admin-password=Admin@12345
parkiyo.bootstrap.admin-first-name=Parkiyo
parkiyo.bootstrap.admin-last-name=Admin

# ================== LOGGING ==================
logging.level.com.parkiyo=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR

# ================== SECURITY & SESSION ==================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ================== MAIL (Gmail SMTP) ==================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=parkiyovehiclemanagement@gmail.com
spring.mail.password=ssldgasnpsbnmjwn
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000