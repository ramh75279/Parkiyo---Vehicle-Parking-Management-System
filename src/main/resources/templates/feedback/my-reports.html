<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Parkiyo | Smart Feedback Center</title>
    <th:block th:replace="~{feedback/fragments :: head-extra}"></th:block>
</head>
<body class="text-slate-100 font-display antialiased min-h-screen flex flex-col overflow-hidden">
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-blue-400 to-primary shrink-0"></div>
<div class="flex flex-1 overflow-hidden min-h-0">
    <th:block th:replace="~{feedback/fragments :: sidebar ('list')}"></th:block>
    <main class="flex-1 flex flex-col overflow-hidden bg-subtle-radial min-w-0">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-6 lg:px-10 bg-background-dark/30 premium-blur shrink-0">
            <div>
                <h1 class="text-xl font-black text-white">Smart Feedback Center</h1>
                <p class="text-[11px] uppercase tracking-[0.18em] text-slate-500 font-black mt-1">Track complaints, reviews &amp; suggestions</p>
            </div>
            <a th:href="@{/feedback/new}" class="flex items-center gap-2 bg-primary text-white font-black px-5 py-2.5 rounded-xl text-sm hover:bg-primary/85 shadow-[0_0_20px_rgba(31,104,249,0.25)]">
                <span class="material-symbols-outlined text-lg">add</span> New report
            </a>
        </header>
        <div class="flex-1 overflow-y-auto p-6 lg:p-10">
            <div th:if="${success}" class="mb-6 rounded-2xl border border-emerald-500/25 bg-emerald-500/10 px-4 py-3 text-sm font-bold text-emerald-200" th:text="${success}"></div>
            <div th:if="${error}" class="mb-6 rounded-2xl border border-rose-500/25 bg-rose-500/10 px-4 py-3 text-sm font-bold text-rose-200" th:text="${error}"></div>

            <div th:if="${#lists.isEmpty(reports)}" class="glass-card rounded-[2rem] p-12 text-center max-w-lg mx-auto">
                <span class="material-symbols-outlined text-5xl text-slate-600">forum</span>
                <p class="mt-4 text-lg font-black text-white">No feedback yet</p>
                <p class="text-slate-500 text-sm font-bold mt-2">Share a review, suggestion, or report an issue on site.</p>
                <a th:href="@{/feedback/new}" class="inline-flex mt-8 items-center gap-2 bg-primary text-white font-black px-6 py-3 rounded-xl text-sm">Submit feedback</a>
            </div>

            <div th:unless="${#lists.isEmpty(reports)}" class="space-y-4 max-w-4xl mx-auto">
                <div th:each="r : ${reports}" class="glass-card rounded-2xl p-5 border border-white/[0.06]">
                    <div class="flex flex-wrap items-start justify-between gap-4">
                        <div class="min-w-0 flex-1">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <h2 class="text-base font-black text-white tracking-tight" th:text="${r.title}">Title</h2>
                                <span th:text="${r.status.displayLabel}"
                                      class="text-[10px] font-black uppercase tracking-wider px-2.5 py-0.5 rounded-lg border"
                                      th:classappend="${r.status.name() == 'PENDING'} ? ' text-amber-300 border-amber-500/25 bg-amber-500/10' :
                                        (${r.status.name() == 'IN_REVIEW'} ? ' text-sky-300 border-sky-500/25 bg-sky-500/10' :
                                        (${r.status.name() == 'RESOLVED'} ? ' text-emerald-300 border-emerald-500/25 bg-emerald-500/10' :
                                        ' text-slate-400 border-slate-600/40 bg-slate-800/40'))">Status</span>
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest border border-white/10 rounded-lg px-2 py-0.5"
                                      th:text="${r.category.displayLabel}">Category</span>
                            </div>
                            <p class="text-sm text-slate-400 font-semibold line-clamp-2" th:text="${r.description}">Description</p>
                            <p th:if="${r.rating != null}" class="text-amber-400 text-sm font-black mt-2"
                               th:text="|Rating: ${r.rating} / 5|">Rating</p>
                            <p class="text-[11px] text-slate-600 font-bold mt-3" th:text="${#temporals.format(r.createdAt, 'dd MMM yyyy · HH:mm')}">Date</p>
                        </div>
                        <div class="flex flex-col items-end gap-3 shrink-0">
                            <div th:if="${r.attachmentPath != null}">
                                <a th:href="|/uploads/${r.attachmentPath}|" target="_blank" rel="noopener"
                                   class="text-xs font-black text-primary hover:underline">View attachment</a>
                            </div>
                            <div th:if="${!#strings.isEmpty(r.adminResponse)}" class="text-right max-w-xs">
                                <p class="text-[9px] font-black uppercase text-slate-500 tracking-widest">Admin reply</p>
                                <p class="text-xs text-slate-300 font-semibold mt-1" th:text="${r.adminResponse}">Reply</p>
                            </div>
                            <div class="flex gap-2" th:if="${(r.status.name() != 'RESOLVED' and r.status.name() != 'REJECTED') and #strings.isEmpty(r.adminResponse)}">
                                <a th:href="@{/feedback/{id}/edit(id=${r.id})}"
                                   class="h-9 px-3 rounded-xl bg-white/5 border border-white/10 text-xs font-black flex items-center gap-1 hover:bg-white/10">
                                    <span class="material-symbols-outlined text-sm">edit</span> Edit
                                </a>
                                <form th:action="@{/feedback/{id}/delete(id=${r.id})}" method="post"
                                      onsubmit="return confirm('Delete this report?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="h-9 px-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-xs font-black text-rose-300 hover:bg-rose-500/20 flex items-center gap-1">
                                        <span class="material-symbols-outlined text-sm">delete</span> Delete
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
