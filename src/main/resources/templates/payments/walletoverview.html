<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parkiyo | Wallet Overview</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#1f68f9", "background-dark": "#020617" },
                    fontFamily: { display: ["Public Sans", "sans-serif"] }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #020617; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-container { width: 80px; transition: 0.4s; overflow: hidden; }
        .sidebar-container:hover { width: 280px; }
        .nav-label { opacity: 0; transition: 0.3s; margin-left: 1rem; }
        .sidebar-container:hover .nav-label { opacity: 1; }
        .input-glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color:white; border-radius:12px; padding:11px 16px; width:100%; }
        .txn-in { color: #34d399; }
        .txn-out { color: #f87171; }
    </style>
</head>

<body class="text-slate-100 flex">

<!-- MAIN CONTENT -->
<main class="flex-1 p-8 space-y-8">

    <!-- HEADER -->
    <div>
        <h1 class="text-2xl font-black">Wallet Overview</h1>
        <p class="text-slate-400 text-sm">Your balance and transactions</p>
    </div>

    <!-- BALANCE -->
    <div class="glass-card p-6 rounded-xl">
        <p class="text-slate-400 text-sm">Balance</p>
        <h2 class="text-4xl font-black">
            $<span th:text="${#numbers.formatDecimal(balance,1,'COMMA',2,'POINT')}">0.00</span>
        </h2>
    </div>

    <!-- QUICK STATS -->
    <div class="grid grid-cols-3 gap-4">

        <!-- ✅ FIXED: use backend values instead -->
        <div class="glass-card p-4 text-center">
            <p class="text-xs text-slate-400">Total In</p>
            <p class="text-green-400 font-bold">
                $<span th:text="${totalIn != null ? totalIn : 0}">0.00</span>
            </p>
        </div>

        <div class="glass-card p-4 text-center">
            <p class="text-xs text-slate-400">Total Out</p>
            <p class="text-red-400 font-bold">
                $<span th:text="${totalOut != null ? totalOut : 0}">0.00</span>
            </p>
        </div>

        <div class="glass-card p-4 text-center">
            <p class="text-xs text-slate-400">Transactions</p>
            <p class="text-white font-bold" th:text="${transactions != null ? transactions.size() : 0}">0</p>
        </div>
    </div>

    <!-- TOPUP -->
    <div class="glass-card p-6 rounded-xl">
        <form th:action="@{/wallet/topup}" method="post">
            <input id="amountInput" name="amount" type="number" class="input-glass" required />
            <button class="mt-4 bg-primary px-4 py-2 rounded text-white font-bold">Top Up</button>
        </form>
    </div>

    <!-- TRANSACTIONS -->
    <div class="glass-card rounded-xl overflow-hidden">
        <div class="p-4 border-b border-white/10">Transactions</div>

        <div th:if="${transactions == null or transactions.isEmpty()}" class="p-6 text-center text-slate-500">
            No transactions yet
        </div>

        <div th:each="txn : ${transactions}" class="p-4 flex justify-between border-b border-white/5">

            <div>
                <p th:text="${txn.description}">Description</p>
                <p class="text-xs text-slate-500"
                   th:text="${txn.createdAt != null ? #temporals.format(txn.createdAt,'MMM dd yyyy HH:mm') : '-'}">
                </p>
            </div>

            <div>
                <p th:classappend="${txn.type == 'CREDIT'} ? 'txn-in' : 'txn-out'"
                   th:text="${(txn.type == 'CREDIT' ? '+' : '-') + txn.amount}">
                    +0.00
                </p>
            </div>

        </div>
    </div>

</main>

<!-- FIXED JS -->
<script>
    function setAmount(val, el) {
        document.getElementById('amountInput').value = val;
        document.querySelectorAll('.topup-amount').forEach(e => e.classList.remove('selected'));
        if (el) el.classList.add('selected');
    }
</script>

</body>
</html>
