<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Parkiyo | Processing Payment</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#1f68f9","background-dark":"#020617"},fontFamily:{display:["Public Sans","sans-serif"]}}}}</script>
    <style>
        body{font-family:'Public Sans',sans-serif;background-color:#020617;}
        .premium-blur{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
        .bg-subtle-radial{background:radial-gradient(circle at 0% 0%,#1e293b 0%,#020617 100%);}
        .glass-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);}

        .spinner{width:72px;height:72px;border-radius:50%;border:4px solid rgba(31,104,249,0.15);border-top-color:#1f68f9;animation:spin 0.9s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}

        .step-item{display:flex;align-items:center;gap:14px;padding:12px 0;}
        .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;shrink:0;flex-shrink:0;font-size:0.7rem;font-weight:900;}
        .step-dot.done{background:rgba(16,185,129,0.15);border:2px solid #10b981;}
        .step-dot.active{background:rgba(31,104,249,0.15);border:2px solid #1f68f9;animation:pulse-border 1.4s ease-in-out infinite;}
        .step-dot.pending{background:rgba(255,255,255,0.03);border:2px solid rgba(255,255,255,0.1);}
        @keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(31,104,249,0.4)}50%{box-shadow:0 0 0 6px rgba(31,104,249,0)}}

        .progress-bar{height:4px;border-radius:4px;background:rgba(255,255,255,0.05);}
        .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#1f68f9,#60a5fa);transition:width 0.6s ease;}
        ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px;}
        a{cursor:pointer;}
    </style>
</head>
<body class="text-slate-100 font-display antialiased min-h-screen flex flex-col bg-subtle-radial">
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-blue-400 to-primary shrink-0"></div>

<div class="flex-1 flex items-center justify-center p-8 min-h-[calc(100vh-6px)]">
    <div class="w-full max-w-md space-y-8">

        <div class="flex items-center justify-center gap-3 mb-2">
            <div class="h-10 w-10 rounded-[14px] bg-primary flex items-center justify-center shadow-[0_0_20px_rgba(31,104,249,0.4)]">
                <span class="material-symbols-outlined text-white text-xl">local_parking</span>
            </div>
            <span class="text-xl font-black tracking-tighter text-white uppercase">Parkiyo</span>
        </div>

        <div class="glass-card rounded-[2.5rem] p-10 text-center" id="processingCard">

            <div class="flex items-center justify-center mb-8" id="spinnerWrap">
                <div class="relative">
                    <div class="spinner" id="spinner"></div>
                    <div class="hidden absolute inset-0 flex items-center justify-center" id="checkIcon">
                        <div class="h-[60px] w-[60px] rounded-full bg-emerald-500/15 border-2 border-emerald-500 flex items-center justify-center">
                            <span class="material-symbols-outlined text-emerald-400 text-1xl rounded-2xl w-72">check</span>
                        </div>
                    </div>
                </div>
            </div>

            <h2 class="text-2xl font-black text-white mb-2" id="mainTitle">Processing Payment</h2>
            <p class="text-sm text-slate-400 font-bold mb-8" id="mainSub">Please wait — do not close this window</p>

            <div class="progress-bar mb-8">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>

            <div class="inline-flex items-center gap-3 bg-white/[0.03] border border-white/8 rounded-2xl px-6 py-4 mb-8" style="border-color:rgba(255,255,255,0.08)">
                <span class="material-symbols-outlined text-primary">account_balance_wallet</span>
                <div class="text-left">
                    <p class="text-[9px] font-black uppercase tracking-widest text-slate-500" th:text="${payment.paymentMethod} ?: 'Payment Method'">Parkiyo Wallet</p>
                    <p class="text-2xl font-black text-white" th
