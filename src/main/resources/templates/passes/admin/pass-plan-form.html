<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit} ? 'Edit Pass Plan' : 'New Pass Plan'">Pass Plan</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#1f68f9", "background-dark": "#020617" },
                    fontFamily: { display: ["Public Sans", "sans-serif"] },
                    borderRadius: { squircle: "14px", xl: "1.5rem", "2xl": "2.1rem", "3xl": "3rem" },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #020617; }
        a { cursor: pointer; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: white; border-radius: 12px; padding: 10px 14px; width: 100%; font-weight: 700; font-size: 0.85rem; }
        .input-glass:focus { outline: none; border-color: rgba(31, 104, 249, 0.5); }
        label.field { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 6px; display: block; }
        .premium-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .bg-subtle-radial { background: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%); }
        .sidebar-container {
            width: 80px;
            min-width: 80px;
            flex-shrink: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .sidebar-container:hover {
            width: 280px;
            min-width: 280px;
            background: rgba(2, 6, 23, 0.95);
        }
        .sidebar-container .sidebar-brand-row {
            justify-content: center;
            padding-left: 1rem;
            padding-right: 1rem;
            transition: justify-content 0.3s ease;
        }
        .sidebar-container:hover .sidebar-brand-row { justify-content: flex-start; }
        .sidebar-container .nav-label {
            opacity: 0;
            max-width: 0;
            overflow: hidden;
            transition: opacity 0.2s ease, max-width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-container:hover .nav-label {
            opacity: 1;
            max-width: 220px;
        }
        .sidebar-container nav a {
            justify-content: center;
            gap: 0;
            transition: gap 0.25s ease, justify-content 0.25s ease;
        }
        .sidebar-container:hover nav a {
            justify-content: flex-start;
            gap: 0.75rem;
        }
        .sidebar-container .mt-auto a.flex {
            justify-content: center;
            gap: 0;
        }
        .sidebar-container:hover .mt-auto a.flex {
            justify-content: flex-start;
            gap: 0.75rem;
        }
        .sidebar-container:not(:hover) .sidebar-logout-row {
            justify-content: center;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }
        .sidebar-container:hover .sidebar-logout-row {
            justify-content: flex-start;
        }
        select.input-glass option { background: #0f172a; }
        ::-webkit-scrollbar { width: 5px; display: none; }
    </style>
</head>
<body class="text-slate-100 font-display antialiased h-screen flex flex-col overflow-hidden">
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-blue-400 to-primary shrink-0"></div>
<div class="flex flex-1 overflow-hidden min-h-0">

    <div th:replace="~{common/fragments :: adminSidebar('passPlans')}"></div>

    <main class="flex-1 flex flex-col overflow-hidden bg-subtle-radial min-w-0">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 lg:px-10 bg-background-dark/30 premium-blur shrink-0">
            <div class="flex items-center gap-4 min-w-0">
                <a th:href="@{/admin/pass-plans}" class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all shrink-0">
                    <span class="material-symbols-outlined text-slate-400">arrow_back</span>
                </a>
                <div class="min-w-0">
                    <h2 class="text-xl font-black text-white truncate" th:text="${isEdit} ? 'Edit plan' : 'Create plan'">Create plan</h2>
                    <p class="text-[11px] uppercase tracking-[0.18em] text-slate-500 font-black mt-1 truncate">Define pricing, duration, zone scope, and benefits</p>
                </div>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-black text-white uppercase tracking-widest" th:text="${currentUser?.fullName} ?: 'Admin'">Admin</p>
                    <p class="text-[10px] text-primary font-bold uppercase tracking-tighter" th:text="${currentUser?.role} ?: 'ADMIN'">ADMIN</p>
                </div>
                <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-primary to-blue-400 p-[2px] shrink-0">
                    <div class="h-full w-full rounded-full overflow-hidden flex items-center justify-center bg-[#1e2535]">
                        <img th:if="${currentUser != null and currentUser.profilePicturePath != null}"
                             th:src="@{${currentUser.profilePicturePath}}"
                             class="h-full w-full object-cover rounded-full"
                             alt="Profile"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
                        <span th:class="${currentUser != null and currentUser.profilePicturePath != null} ? 'material-symbols-outlined text-white/70 text-2xl items-center justify-center h-full w-full hidden' : 'material-symbols-outlined text-white/70 text-2xl flex items-center justify-center h-full w-full'">
                            person
                        </span>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-10">
            <div class="max-w-xl mx-auto">
                <div th:if="${error}" class="mb-6 p-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm font-black" th:text="${error}"></div>
                <form th:action="@{/admin/pass-plans/save}" method="post" class="glass-card rounded-[2rem] p-8 space-y-5">
                    <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id" th:value="${plan.id}" th:if="${plan.id != null}"/>

                    <div>
                        <label class="field">Name</label>
                        <input name="name" class="input-glass" required th:value="${plan.name}" placeholder="e.g. Monthly Zone A"/>
                    </div>
                    <div>
                        <label class="field">Description</label>
                        <textarea name="description" rows="2" class="input-glass" placeholder="Short summary for users" th:text="${plan.description}"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="field">Category</label>
                            <select name="category" class="input-glass">
                                <option th:each="c : ${categories}" th:value="${c}" th:text="${c}" th:selected="${plan.category == c}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="field">Display order</label>
                            <input type="number" name="displayOrder" class="input-glass" th:value="${plan.displayOrder}"/>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="field">Price (Rs.)</label>
                            <input type="number" step="0.01" min="0" name="price" class="input-glass" required th:value="${plan.price}"/>
                        </div>
                        <div>
                            <label class="field">Duration (days)</label>
                            <input type="number" min="1" name="durationDays" class="input-glass" required th:value="${plan.durationDays}"/>
                        </div>
                    </div>
                    <div>
                        <label class="field">Zone</label>
                        <input name="zone" class="input-glass" th:value="${plan.zone}" placeholder="ALL or match slot zone e.g. Ground Floor"/>
                        <p class="text-[10px] text-slate-600 mt-2 font-bold">Use <span class="text-primary">ALL</span> or leave blank for any zone.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" name="unlimitedParking" id="unl" value="true" th:checked="${plan.unlimitedParking}" class="rounded border-white/20 bg-white/5"/>
                        <label for="unl" class="text-sm font-black text-white">Unlimited parking (exit fee Rs. 0)</label>
                    </div>
                    <div>
                        <label class="field">Discount % (if not unlimited)</label>
                        <input type="number" step="0.01" min="0" max="100" name="discountPercent" class="input-glass" th:value="${plan.discountPercent}"/>
                    </div>
                    <div>
                        <label class="field">Catalog visibility</label>
                        <div class="flex gap-6 mt-2">
                            <label class="flex items-center gap-2 text-sm font-bold text-white cursor-pointer">
                                <input type="radio" name="active" value="true" th:checked="${plan.active}"/> Show to users
                            </label>
                            <label class="flex items-center gap-2 text-sm font-bold text-slate-500 cursor-pointer">
                                <input type="radio" name="active" value="false" th:checked="${!plan.active}"/> Hidden
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="w-full py-4 rounded-2xl bg-primary text-white font-black text-sm hover:brightness-110">Save plan</button>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
