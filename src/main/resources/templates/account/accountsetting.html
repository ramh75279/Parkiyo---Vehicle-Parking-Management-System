<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Parkiyo | Admin Settings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Public Sans', sans-serif; background: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%); }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="text-slate-100 min-h-screen">
<main class="max-w-6xl mx-auto px-5 md:px-8 py-8 space-y-6">
    <header class="flex items-center justify-between gap-4 flex-wrap">
        <div>
            <h1 class="text-2xl font-black">Admin Settings</h1>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mt-1">Real account management</p>
        </div>
        <div class="text-right">
            <p class="text-xs font-black uppercase" th:text="${user.fullName}">Admin</p>
            <p class="text-[10px] text-blue-400 font-bold uppercase" th:text="${user.role}">ADMIN</p>
        </div>
    </header>

    <div th:if="${success != null}" class="card text-emerald-300 px-4 py-3 rounded-xl text-sm font-bold" th:text="${success}"></div>
    <div th:if="${error != null}" class="card text-rose-300 px-4 py-3 rounded-xl text-sm font-bold" th:text="${error}"></div>

    <section class="grid lg:grid-cols-[320px_1fr] gap-6">
        <div class="card rounded-3xl p-6">
            <div class="h-40 w-40 mx-auto rounded-[2rem] overflow-hidden bg-slate-900 border border-white/10 flex items-center justify-center">
                <img th:if="${user.profilePicturePath != null}" th:src="@{${user.profilePicturePath}}" class="h-full w-full object-cover" alt="Profile photo"/>
                <span th:if="${user.profilePicturePath == null}" th:text="${user.initials}" class="text-4xl font-black text-white">AD</span>
            </div>
            <p class="text-center font-black text-lg mt-5" th:text="${user.fullName}">Admin User</p>
            <p class="text-center text-slate-400 text-sm" th:text="${user.email}">admin@parkiyo.com</p>
            <p class="text-center text-xs uppercase tracking-[0.2em] text-slate-500 mt-2">
                Last login:
                <span th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt, 'dd MMM yyyy HH:mm') : 'Not recorded'}">Not recorded</span>
            </p>

            <form class="mt-6 space-y-3" enctype="multipart/form-data" method="post" th:action="@{/account/settings/photo}">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <input class="block w-full rounded-xl border border-white/10 bg-slate-900/60 px-3 py-2 text-sm" name="photo" type="file" accept=".jpg,.jpeg,.png,.webp"/>
                <button class="w-full bg-blue-600 hover:bg-blue-500 px-4 py-3 rounded-xl text-sm font-black" type="submit">Update Photo</button>
            </form>
        </div>

        <div class="space-y-6">
            <section class="card rounded-3xl p-6">
                <h2 class="text-sm font-black uppercase tracking-widest text-slate-400">Profile Details</h2>
                <form class="grid md:grid-cols-2 gap-4 mt-5" method="post" th:action="@{/account/settings/profile}">
                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                    <div>
                        <label class="text-xs font-black uppercase tracking-widest text-slate-500">First Name</label>
                        <input class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3" name="firstName" th:value="${user.firstName}" type="text"/>
                    </div>
                    <div>
                        <label class="text-xs font-black uppercase tracking-widest text-slate-500">Last Name</label>
                        <input class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3" name="lastName" th:value="${user.lastName}" type="text"/>
                    </div>
                    <div>
                        <label class="text-xs font-black uppercase tracking-widest text-slate-500">Phone</label>
                        <input class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3" name="phone" th:value="${user.phone}" type="text"/>
                    </div>
                    <div>
                        <label class="text-xs font-black uppercase tracking-widest text-slate-500">Email</label>
                        <input class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900/30 px-4 py-3 text-slate-400" th:value="${user.email}" type="text" readonly/>
                    </div>
                    <div class="md:col-span-2">
                        <button class="bg-blue-600 hover:bg-blue-500 px-5 py-3 rounded-xl text-sm font-black" type="submit">Save Profile</button>
                    </div>
                </form>
            </section>

            <section class="grid xl:grid-cols-2 gap-6">
                <div class="card rounded-3xl p-6">
                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-400">Password</h2>
                    <form class="space-y-4 mt-5" method="post" th:action="@{/account/settings/password}">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <input class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3" name="currentPassword" placeholder="Current password" type="password"/>
                        <input class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3" name="newPassword" placeholder="New password" type="password"/>
                        <input class="w-full rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3" name="confirmPassword" placeholder="Confirm new password" type="password"/>
                        <button class="bg-white/10 hover:bg-white/20 px-5 py-3 rounded-xl text-sm font-black" type="submit">Update Password</button>
                    </form>
                </div>

                <div class="card rounded-3xl p-6">
                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-400">Notifications</h2>
                    <form class="space-y-4 mt-5" method="post" th:action="@{/account/settings/notifications}">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <label class="flex items-center justify-between rounded-2xl border border-white/10 px-4 py-4">
                            <div>
                                <p class="font-bold">Email Notifications</p>
                                <p class="text-xs text-slate-500">Receipts and account activity</p>
                            </div>
                            <input class="h-5 w-5 rounded" name="emailNotificationsEnabled" th:checked="${user.emailNotificationsEnabled}" type="checkbox"/>
                        </label>
                        <label class="flex items-center justify-between rounded-2xl border border-white/10 px-4 py-4">
                            <div>
                                <p class="font-bold">SMS Notifications</p>
                                <p class="text-xs text-slate-500">Urgent parking and payment alerts</p>
                            </div>
                            <input class="h-5 w-5 rounded" name="smsNotificationsEnabled" th:checked="${user.smsNotificationsEnabled}" type="checkbox"/>
                        </label>
                        <button class="bg-white/10 hover:bg-white/20 px-5 py-3 rounded-xl text-sm font-black" type="submit">Save Preferences</button>
                    </form>
                </div>
            </section>
        </div>
    </section>
</main>
</body>
</html>
