<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Parkiyo | My Notifications</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Public Sans', sans-serif; background: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%); }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.09); }
    </style>
</head>
<body class="text-slate-100 min-h-screen">
<main class="max-w-5xl mx-auto px-5 md:px-8 py-8 space-y-6">
    <header class="flex items-center justify-between flex-wrap gap-3">
        <div>
            <h1 class="text-2xl font-black">My Notifications</h1>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mt-1">Live updates</p>
        </div>
        <a class="px-4 py-2 rounded-xl bg-white/10 border border-white/10 text-sm font-black hover:bg-white/20" th:href="@{/dashboard/user}">Back to Dashboard</a>
    </header>

    <section class="card rounded-3xl overflow-hidden">
        <div class="px-5 py-4 border-b border-white/10 text-xs uppercase tracking-widest text-slate-500 font-black">Notifications</div>
        <div th:if="${#lists.isEmpty(notifications)}" class="px-5 py-8 text-slate-500 text-sm">No notifications yet.</div>
        <div th:each="n : ${notifications}" class="px-5 py-4 border-b border-white/5 last:border-b-0">
            <div class="flex flex-wrap items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black px-2 py-1 rounded-lg border bg-blue-500/10 border-blue-500/20 text-blue-300" th:text="${n.type}">SYSTEM</span>
                    <span class="text-xs font-black px-2 py-1 rounded-lg border"
                          th:classappend="${n.read} ? ' bg-slate-500/10 border-slate-500/20 text-slate-300' : ' bg-emerald-500/10 border-emerald-500/20 text-emerald-300'"
                          th:text="${n.read} ? 'READ' : 'UNREAD'">UNREAD</span>
                </div>
                <span class="text-xs text-slate-500" th:text="${n.createdAt != null ? #temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">-</span>
            </div>
            <h3 class="font-bold mt-2" th:text="${n.title}">Notification title</h3>
            <p class="text-sm text-slate-300 mt-1" th:text="${n.message}">Notification message</p>
            <a th:if="${n.actionUrl != null and !#strings.isEmpty(n.actionUrl)}"
               th:href="@{${n.actionUrl}}"
               class="inline-block mt-2 text-xs font-black text-blue-300">Open</a>
        </div>
    </section>
</main>
</body>
</html>
