<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Parkiyo | Create Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#1f68f9", "background-dark": "#020617" },
                    fontFamily: { display: ["Public Sans", "sans-serif"] },
                    borderRadius: { squircle: "14px", xl: "1.5rem", "2xl": "2.1rem", "3xl": "3rem" },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        a { cursor: pointer; }
        .premium-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .bg-subtle-radial { background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%); }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .input-glass {
            background: rgba(255,255,255,0.04) !important;
            border: 1px solid rgba(255,255,255,0.09);
            color: white !important;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Public Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
            width: 100%;
        }
        .input-glass:hover {
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.055) !important;
        }
        .input-glass:focus {
            background: rgba(31,104,249,0.07) !important;
            border-color: rgba(31,104,249,0.55) !important;
            box-shadow: 0 0 0 3px rgba(31,104,249,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .input-glass::placeholder { color: rgba(148,163,184,0.45); font-weight: 500; }
        select.input-glass option { background: #0d1829; color: white; }
        select.input-glass { cursor: pointer; }
        textarea.input-glass { resize: none; }
        .input-glass:-webkit-autofill,
        .input-glass:-webkit-autofill:hover,
        .input-glass:-webkit-autofill:focus,
        .input-glass:-webkit-autofill:active {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px #0a1628 inset !important;
            caret-color: white;
        }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus { -webkit-text-fill-color: white !important; -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important; }
        input:invalid { box-shadow: none !important; outline: none !important; }
        input:-moz-ui-invalid { box-shadow: none !important; }
        select.input-glass option { background: #0f172a; }
        .notify-error { background: linear-gradient(180deg, rgba(244,63,94,0.14), rgba(244,63,94,0.06)); border: 1px solid rgba(244,63,94,0.2); color: #fb7185; }
        .notify-success { background: linear-gradient(180deg, rgba(34,197,94,0.14), rgba(34,197,94,0.06)); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; }
        .pw-strength-bar { height: 4px; border-radius: 2px; transition: width 0.4s ease, background 0.4s ease; }
        @keyframes slideDown { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .msg-in { animation: slideDown 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-background-dark text-slate-100 font-display antialiased min-h-screen flex flex-col bg-subtle-radial">

<div th:replace="~{common/fragments :: authNavbar('home', '/sign-in', 'Sign In')}"></div>

<main class="flex-grow flex items-center justify-center py-16 px-6">
    <div class="w-full max-w-xl">
        <div class="glass-card rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="p-10 lg:p-14">
                <div class="mb-10">
                    <div class="inline-flex items-center justify-center w-14 h-14 bg-primary/10 text-primary rounded-2xl mb-6 border border-primary/20">
                        <span class="material-symbols-outlined text-2xl">person_add</span>
                    </div>
                    <h2 class="text-3xl font-black text-white tracking-tight mb-2">Create your account</h2>
                    <p class="text-slate-400 font-medium text-sm leading-relaxed">Self-registration creates a standard user account. Admin accounts are created by administrators only.</p>
                </div>

                <div class="mb-8 rounded-2xl border border-primary/20 bg-primary/5 p-5 flex items-start gap-4">
                    <span class="material-symbols-outlined text-primary shrink-0 mt-0.5">info</span>
                    <p class="text-sm text-slate-400 leading-relaxed font-medium">This form creates a <strong class="text-white">standard user account</strong> only. Contact your facility admin if you require admin access.</p>
                </div>

                <form id="registerForm" th:action="@{/register}" method="post" novalidate class="space-y-5">
                    <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div id="formMsg" class="hidden px-4 py-4 rounded-2xl text-[13px] font-bold flex items-start gap-3 msg-in">
                        <span id="formMsgIcon" class="material-symbols-outlined text-base mt-[1px] shrink-0">info</span>
                        <p id="formMsgText"></p>
                    </div>

                    <div th:if="${error != null and !#strings.isEmpty(error)}" class="px-4 py-4 rounded-2xl text-[13px] font-bold flex items-start gap-3 notify-error">
                        <span class="material-symbols-outlined text-base mt-[1px] shrink-0">error</span>
                        <p th:text="${error}"></p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">First Name</label>
                            <input type="text" id="firstName" name="firstName" class="w-full h-14 rounded-2xl px-5 input-glass font-medium" placeholder="John"/>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Last Name</label>
                            <input type="text" id="lastName" name="lastName" class="w-full h-14 rounded-2xl px-5 input-glass font-medium" placeholder="Smith"/>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Email Address</label>
                        <input type="email" id="email" name="email" class="w-full h-14 rounded-2xl px-5 input-glass font-medium" placeholder="you@example.com" autocomplete="email"/>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="w-full h-14 rounded-2xl px-5 input-glass font-medium" placeholder="+1 555 000 0000"/>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Gender</label>
                        <select id="gender" name="gender" class="w-full h-14 rounded-2xl px-5 input-glass font-medium appearance-none cursor-pointer">
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Prefer not to say</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Password</label>
                        <div class="relative">
                            <input type="password" id="password" name="password" class="w-full h-14 rounded-2xl px-5 pr-14 input-glass font-medium" placeholder="Create a strong password" oninput="checkPwStrength(this.value)"/>
                            <button type="button" onclick="togglePw('password','eyePw')" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                                <span id="eyePw" class="material-symbols-outlined text-xl">visibility</span>
                            </button>
                        </div>
                        <div class="mt-2 h-1 w-full bg-white/5 rounded-full overflow-hidden">
                            <div id="pwStrengthBar" class="pw-strength-bar w-0 bg-rose-500"></div>
                        </div>
                        <p id="pwStrengthLabel" class="text-[10px] font-black uppercase tracking-widest text-slate-600 mt-1.5"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Confirm Password</label>
                        <div class="relative">
                            <input type="password" id="confirmPw" name="confirmPw" class="w-full h-14 rounded-2xl px-5 pr-14 input-glass font-medium" placeholder="Repeat your password"/>
                            <button type="button" onclick="togglePw('confirmPw','eyeCpw')" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                                <span id="eyeCpw" class="material-symbols-outlined text-xl">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="pt-2 grid grid-cols-2 gap-4">
                        <button type="button" onclick="resetForm()" class="h-14 bg-white/5 border border-white/10 text-slate-300 font-bold rounded-2xl hover:bg-white/10 transition-all">
                            Reset All
                        </button>
                        <button type="submit" class="h-14 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            Create Account
                            <span class="material-symbols-outlined text-lg">person_add</span>
                        </button>
                    </div>
                </form>

                <div class="mt-8 pt-8 border-t border-white/5 text-center">
                    <p class="text-slate-500 text-sm font-medium">Already have an account? <a th:href="@{/sign-in}" class="text-primary font-black hover:brightness-125 transition-all">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    function togglePw(id, iconId) {
        const el = document.getElementById(id);
        const icon = document.getElementById(iconId);
        el.type = el.type === 'password' ? 'text' : 'password';
        icon.textContent = el.type === 'password' ? 'visibility' : 'visibility_off';
    }

    function checkPwStrength(val) {
        const bar = document.getElementById('pwStrengthBar');
        const label = document.getElementById('pwStrengthLabel');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const map = [{w:'0%',c:'bg-rose-500',t:''},{w:'25%',c:'bg-rose-500',t:'Weak'},{w:'50%',c:'bg-amber-500',t:'Fair'},{w:'75%',c:'bg-blue-400',t:'Good'},{w:'100%',c:'bg-emerald-500',t:'Strong'}];
        bar.style.width = map[score].w;
        bar.className = `pw-strength-bar ${map[score].c}`;
        label.textContent = map[score].t;
        label.style.color = score === 4 ? '#4ade80' : score >= 2 ? '#fbbf24' : '#f87171';
    }

    function resetForm() {
        document.getElementById('registerForm').reset();
        document.getElementById('pwStrengthBar').style.width = '0%';
        document.getElementById('pwStrengthLabel').textContent = '';
        hideMsg();
    }

    const formMsg = document.getElementById('formMsg');
    const formMsgText = document.getElementById('formMsgText');
    const formMsgIcon = document.getElementById('formMsgIcon');

    function showMsg(type, text) {
        formMsg.className = `px-4 py-4 rounded-2xl text-[13px] font-bold flex items-start gap-3 msg-in ${type === 'error' ? 'notify-error' : 'notify-success'}`;
        formMsgIcon.textContent = type === 'error' ? 'error' : 'check_circle';
        formMsgText.textContent = text;
    }
    function hideMsg() { formMsg.classList.add('hidden'); }

    document.getElementById('registerForm').addEventListener('submit', e => {
        const fn = document.getElementById('firstName').value.trim();
        const ln = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const phone = document.getElementById('phone').value.trim();
        const gender = document.getElementById('gender').value;
        const pw = document.getElementById('password').value;
        const cpw = document.getElementById('confirmPw').value;

        if (!fn || !ln) { e.preventDefault(); showMsg('error', 'Please enter your first and last name.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { e.preventDefault(); showMsg('error', 'Enter a valid email address.'); return; }
        if (!phone) { e.preventDefault(); showMsg('error', 'Please enter your phone number.'); return; }
        if (!gender) { e.preventDefault(); showMsg('error', 'Please select your gender.'); return; }
        if (pw.length < 8) { e.preventDefault(); showMsg('error', 'Password must be at least 8 characters long.'); return; }
        if (pw !== cpw) { e.preventDefault(); showMsg('error', 'Passwords do not match. Please check and try again.'); return; }
    });
</script>
</body>
</html>
