<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Parkiyo | Set New Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#1f68f9", "background-dark": "#020617" }, fontFamily: { display: ["Public Sans", "sans-serif"] } } } }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .premium-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .bg-subtle-radial { background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%); }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .input-glass { background: rgba(255,255,255,0.04) !important; border: 1px solid rgba(255,255,255,0.09); color: white !important; border-radius: 14px; padding: 12px 16px; font-size: 0.875rem; font-weight: 600; outline: none; width: 100%; }
        .input-glass:focus { background: rgba(31,104,249,0.07) !important; border-color: rgba(31,104,249,0.55) !important; box-shadow: 0 0 0 3px rgba(31,104,249,0.12); }
        .notify-error { background: linear-gradient(180deg, rgba(244,63,94,0.14), rgba(244,63,94,0.06)); border: 1px solid rgba(244,63,94,0.2); }
    </style>
</head>
<body class="bg-background-dark text-slate-100 font-display antialiased min-h-screen flex flex-col bg-subtle-radial">
<div th:replace="~{common/fragments :: authNavbar('home', '/sign-in', 'Sign In')}"></div>
<main class="flex-grow flex items-center justify-center py-16 px-6">
    <div class="w-full max-w-xl">
        <div class="glass-card rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="p-10 lg:p-14">
                <div class="mb-10">
                    <div class="inline-flex items-center justify-center w-14 h-14 bg-primary/10 text-primary rounded-2xl mb-6 border border-primary/20">
                        <span class="material-symbols-outlined text-2xl">lock_reset</span>
                    </div>
                    <h2 class="text-3xl font-black text-white tracking-tight mb-2">Set new password</h2>
                    <p class="text-slate-400 font-medium text-sm leading-relaxed">Enter the account email and choose a new password.</p>
                </div>

                <div th:if="${error != null and !#strings.isEmpty(error)}" class="mb-6 px-4 py-4 rounded-2xl text-[13px] font-bold flex items-start gap-3 notify-error text-rose-400">
                    <span class="material-symbols-outlined text-base mt-[1px]">error</span>
                    <p th:text="${error}"></p>
                </div>

                <form th:action="@{/reset-password}" method="post" class="space-y-5">
                    <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="token" th:value="${token}"/>

                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Email Address</label>
                        <!-- Fixed: pre-fills from URL param so user doesn't have to type it -->
                        <input type="email" name="email"
                               th:value="${param.email != null ? param.email[0] : ''}"
                               class="w-full h-14 rounded-2xl px-5 input-glass font-medium"
                               placeholder="you@parkiyo.com"
                               autocomplete="email" required/>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">New Password</label>
                        <input type="password" name="newPassword" class="w-full h-14 rounded-2xl px-5 input-glass font-medium" placeholder="New password" autocomplete="new-password" required/>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Confirm Password</label>
                        <input type="password" name="confirmPassword" class="w-full h-14 rounded-2xl px-5 input-glass font-medium" placeholder="Confirm password" autocomplete="new-password" required/>
                    </div>
                    <button type="submit" class="w-full h-16 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                        Update Password
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
