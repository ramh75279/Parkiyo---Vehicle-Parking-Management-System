<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Parkiyo | User Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Public Sans', sans-serif; background: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%); }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.09); }
    </style>
</head>
<body class="text-slate-100 min-h-screen">
<main class="max-w-7xl mx-auto px-5 md:px-8 py-8 space-y-6">
    <header class="flex flex-wrap items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-black">User Management</h1>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mt-1">Live account data</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-xs font-black uppercase" th:text="${currentUser.fullName}">Admin</p>
                <p class="text-[10px] text-blue-400 font-bold uppercase" th:text="${currentUser.role}">ADMIN</p>
            </div>
            <a th:href="@{/admin/users/create}" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-sm font-black">Add User</a>
        </div>
    </header>

    <div th:if="${success}" class="card text-emerald-300 px-4 py-3 rounded-xl text-sm font-bold" th:text="${success}"></div>
    <div th:if="${error}" class="card text-rose-300 px-4 py-3 rounded-xl text-sm font-bold" th:text="${error}"></div>

    <section class="grid md:grid-cols-3 gap-4">
        <div class="card rounded-2xl p-5">
            <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Total Users</p>
            <p class="text-2xl font-black mt-2" th:text="${totalUsers}">0</p>
        </div>
        <div class="card rounded-2xl p-5">
            <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Admins</p>
            <p class="text-2xl font-black mt-2 text-blue-400" th:text="${adminUsers}">0</p>
        </div>
        <div class="card rounded-2xl p-5">
            <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Active Users</p>
            <p class="text-2xl font-black mt-2 text-emerald-400" th:text="${activeUsers}">0</p>
        </div>
    </section>

    <section class="card rounded-3xl overflow-hidden">
        <form class="p-5 border-b border-white/10 grid md:grid-cols-4 gap-3" method="get" th:action="@{/admin/users}">
            <input class="bg-slate-900/70 border border-white/10 rounded-xl px-3 py-2 text-sm" name="search" placeholder="Search user/email" th:value="${param.search}"/>
            <select class="bg-slate-900/70 border border-white/10 rounded-xl px-3 py-2 text-sm" name="role">
                <option value="">All Roles</option>
                <option value="ADMIN" th:selected="${param.role != null and param.role[0] == 'ADMIN'}">ADMIN</option>
                <option value="USER" th:selected="${param.role != null and param.role[0] == 'USER'}">USER</option>
            </select>
            <select class="bg-slate-900/70 border border-white/10 rounded-xl px-3 py-2 text-sm" name="status">
                <option value="">All Status</option>
                <option value="ACTIVE" th:selected="${param.status != null and param.status[0] == 'ACTIVE'}">ACTIVE</option>
                <option value="INACTIVE" th:selected="${param.status != null and param.status[0] == 'INACTIVE'}">INACTIVE</option>
                <option value="SUSPENDED" th:selected="${param.status != null and param.status[0] == 'SUSPENDED'}">SUSPENDED</option>
            </select>
            <button class="bg-white/10 border border-white/10 rounded-xl px-3 py-2 text-sm font-black hover:bg-white/20" type="submit">Apply Filters</button>
        </form>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                <tr class="text-[10px] uppercase tracking-widest text-slate-500 border-b border-white/10">
                    <th class="px-5 py-4">User</th>
                    <th class="px-5 py-4">Email</th>
                    <th class="px-5 py-4">Phone</th>
                    <th class="px-5 py-4">Role</th>
                    <th class="px-5 py-4">Status</th>
                    <th class="px-5 py-4">Actions</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                <tr th:if="${#lists.isEmpty(users)}">
                    <td class="px-5 py-8 text-center text-slate-500" colspan="6">No users found.</td>
                </tr>
                <tr th:each="u : ${users}">
                    <td class="px-5 py-4 font-bold" th:text="${u.fullName}">User Name</td>
                    <td class="px-5 py-4 text-slate-300" th:text="${u.email}">email@example.com</td>
                    <td class="px-5 py-4 text-slate-300" th:text="${u.phone ?: '-'}">-</td>
                    <td class="px-5 py-4">
                        <span class="px-2 py-1 rounded-lg text-xs font-black bg-blue-500/15 text-blue-300 border border-blue-500/30" th:text="${u.role}">USER</span>
                    </td>
                    <td class="px-5 py-4">
                        <span class="px-2 py-1 rounded-lg text-xs font-black border"
                              th:classappend="${u.status.name() == 'ACTIVE'} ? ' bg-emerald-500/15 text-emerald-300 border-emerald-500/30' : ' bg-rose-500/15 text-rose-300 border-rose-500/30'"
                              th:text="${u.status}">ACTIVE</span>
                    </td>
                    <td class="px-5 py-4">
                        <div class="flex flex-wrap gap-2">
                            <a class="px-3 py-1.5 rounded-lg text-xs font-black bg-blue-600/20 text-blue-300 border border-blue-500/40"
                               th:href="@{/admin/users/{id}/edit(id=${u.id})}">Edit</a>
                            <form method="post" th:action="@{/admin/users/{id}/toggle-status(id=${u.id})}">
                                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                                <button class="px-3 py-1.5 rounded-lg text-xs font-black bg-amber-500/20 text-amber-300 border border-amber-500/40" type="submit">Toggle</button>
                            </form>
                            <form method="post" onsubmit="return confirm('Delete this user?')" th:action="@{/admin/users/{id}/delete(id=${u.id})}">
                                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                                <button class="px-3 py-1.5 rounded-lg text-xs font-black bg-rose-500/20 text-rose-300 border border-rose-500/40" type="submit">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
