<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="|Parkiyo Admin | Feedback #${report.id}|">Parkiyo Admin | Feedback</title>
    <th:block th:replace="~{admin/feedback/fragments :: admin-layout-head}"></th:block>
</head>
<body class="text-slate-100 font-display antialiased h-screen flex flex-col overflow-hidden">
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-blue-400 to-primary shrink-0"></div>
<div class="flex flex-1 overflow-hidden">

    <div th:replace="~{common/fragments :: adminSidebar('feedback')}"></div>

    <main class="flex-1 flex flex-col overflow-hidden bg-subtle-radial">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 bg-background-dark/30 premium-blur shrink-0">
            <div class="flex items-center gap-4 min-w-0">
                <a th:href="@{/admin/feedback}" class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all shrink-0">
                    <span class="material-symbols-outlined text-slate-400">arrow_back</span>
                </a>
                <div class="min-w-0">
                    <h2 class="text-xl font-black text-white truncate" th:text="${report.title}">Title</h2>
                    <p class="text-[11px] uppercase tracking-[0.18em] text-slate-500 font-black mt-1">Report #<span th:text="${report.id}">0</span></p>
                </div>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-black text-white uppercase tracking-widest" th:text="${currentUser?.fullName} ?: 'Admin'">Admin</p>
                    <p class="text-[10px] text-primary font-bold uppercase tracking-tighter" th:text="${currentUser?.role} ?: 'ADMIN'">ADMIN</p>
                </div>
                <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-primary to-blue-400 p-[2px] shrink-0">
                    <div class="h-full w-full rounded-full overflow-hidden flex items-center justify-center bg-[#1e2535]">
                        <img th:if="${currentUser != null and currentUser.profilePicturePath != null}"
                             th:src="@{${currentUser.profilePicturePath}}"
                             class="h-full w-full object-cover rounded-full"
                             alt="Profile"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
                        <span th:class="${currentUser != null and currentUser.profilePicturePath != null} ? 'material-symbols-outlined text-white/70 text-2xl items-center justify-center h-full w-full hidden' : 'material-symbols-outlined text-white/70 text-2xl flex items-center justify-center h-full w-full'">
                            person
                        </span>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-10">
            <div class="max-w-4xl mx-auto space-y-8">
                <div th:if="${success}" class="rounded-xl border border-emerald-500/25 bg-emerald-500/10 px-4 py-3 text-sm font-bold text-emerald-200" th:text="${success}"></div>
                <div th:if="${error}" class="rounded-xl border border-rose-500/25 bg-rose-500/10 px-4 py-3 text-sm font-bold text-rose-200" th:text="${error}"></div>

                <div class="glass-card rounded-[2rem] p-8 border border-white/[0.06] space-y-4">
                    <div class="flex flex-wrap justify-between gap-4">
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-500">Submitted by</p>
                            <p class="text-white font-black" th:text="${report.user.email}">—</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black uppercase text-slate-500">Created</p>
                            <p class="text-slate-300 font-bold text-sm" th:text="${#temporals.format(report.createdAt, 'dd MMM yyyy HH:mm')}">—</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 text-xs font-black">
                        <span class="rounded-lg border border-white/10 px-2 py-1 text-slate-400" th:text="${report.category.displayLabel}">Cat</span>
                        <span class="rounded-lg border border-amber-500/20 bg-amber-500/10 px-2 py-1 text-amber-300" th:text="${report.status.displayLabel}">Status</span>
                        <span th:if="${report.rating != null}" class="rounded-lg border border-amber-500/20 px-2 py-1 text-amber-200"
                              th:text="|Rating ${report.rating}/5|">Rating</span>
                    </div>
                    <p class="text-slate-300 font-semibold leading-relaxed whitespace-pre-wrap" th:text="${report.description}">Desc</p>
                    <div th:if="${report.attachmentPath != null}">
                        <p class="text-[10px] font-black uppercase text-slate-500 mb-2">Attachment</p>
                        <img th:src="|/uploads/${report.attachmentPath}|" alt="Attachment" class="max-h-64 rounded-xl border border-white/10"/>
                    </div>
                </div>

                <form th:action="@{/admin/feedback/{id}(id=${report.id})}" method="post" class="glass-card rounded-[2rem] p-8 border border-white/[0.06] space-y-5">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <h2 class="text-lg font-black text-white">Admin actions</h2>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Status</label>
                            <select name="status" class="w-full rounded-xl bg-white/5 border border-white/10 px-3 py-2.5 text-sm font-bold text-white">
                                <option th:each="s : ${statuses}" th:value="${s.name()}" th:selected="${s == report.status}" th:text="${s.displayLabel}">—</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Priority</label>
                            <select name="priority" class="w-full rounded-xl bg-white/5 border border-white/10 px-3 py-2.5 text-sm font-bold text-white">
                                <option th:each="p : ${priorities}" th:value="${p.name()}" th:selected="${p == report.priority}" th:text="${p.displayLabel}">—</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Response to user</label>
                        <textarea name="adminResponse" rows="5" th:text="${report.adminResponse}"
                                  placeholder="Visible to the user on their My Feedback page…"
                                  class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3 text-sm text-white font-semibold placeholder:text-slate-600 outline-none focus:border-primary/40"></textarea>
                    </div>
                    <button type="submit" class="w-full md:w-auto rounded-xl bg-primary text-white font-black px-8 py-3 text-sm hover:bg-primary/85">Save update</button>
                </form>

                <form th:action="@{/admin/feedback/{id}/delete(id=${report.id})}" method="post" onsubmit="return confirm('Permanently delete this report?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="rounded-xl border border-rose-500/30 bg-rose-500/10 text-rose-300 font-black px-6 py-3 text-sm hover:bg-rose-500/20">Delete report</button>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
