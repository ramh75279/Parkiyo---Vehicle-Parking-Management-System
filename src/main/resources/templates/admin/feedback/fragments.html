<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="admin-layout-head">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#1f68f9", "background-dark": "#020617" },
                    fontFamily: { display: ["Public Sans", "sans-serif"] },
                    borderRadius: { squircle: "14px", xl: "1.5rem", "2xl": "2.1rem", "3xl": "3rem" },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #020617; }
        .premium-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .bg-subtle-radial { background: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-container {
            width: 80px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(2, 6, 23, 0.6);
            overflow: hidden;
            white-space: nowrap;
        }
        .sidebar-container:hover {
            width: 280px;
            background: rgba(2, 6, 23, 0.95);
        }
        .nav-label {
            opacity: 0;
            transition: opacity 0.3s ease, margin 0.3s ease, width 0.3s ease;
            margin-left: 0;
            width: 0;
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .sidebar-container:hover .nav-label {
            opacity: 1;
            width: auto;
            margin-left: 1rem;
        }
        .sidebar-container:not(:hover) nav a {
            justify-content: center;
            gap: 0;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }
        .sidebar-container:hover nav a {
            justify-content: flex-start;
            gap: 0.75rem;
        }
        .sidebar-container:not(:hover) .sidebar-logo-row { justify-content: center; }
        .sidebar-container:hover .sidebar-logo-row { justify-content: flex-start; }
        .sidebar-container:not(:hover) .sidebar-brand-row { justify-content: center; }
        .sidebar-container:hover .sidebar-brand-row { justify-content: flex-start; }
        .sidebar-container:not(:hover) .mt-auto a {
            justify-content: center;
            gap: 0;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }
        .sidebar-container:hover .mt-auto a {
            justify-content: flex-start;
            gap: 0.75rem;
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .sidebar-container:not(:hover) .sidebar-logout-row {
            justify-content: center;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }
        .sidebar-container:hover .sidebar-logout-row { justify-content: flex-start; }
        ::-webkit-scrollbar { width: 5px; display: none; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        a { cursor: pointer; }
    </style>
</th:block>
</body>
</html>
