<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Parkiyo | Edit User</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#1f68f9", "background-dark": "#020617" },
                    fontFamily: { display: ["Public Sans", "sans-serif"] },
                    borderRadius: { squircle: "14px", xl: "1.5rem", "2xl": "2.1rem", "3xl": "3rem" },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #020617; }
        a { cursor: pointer; }
        .premium-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .bg-subtle-radial { background: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%); }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .sidebar-container {
            width: 80px;
            min-width: 80px;
            flex-shrink: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .sidebar-container:hover {
            width: 280px;
            min-width: 280px;
            background: rgba(2, 6, 23, 0.95);
        }
        .sidebar-container .sidebar-brand-row {
            justify-content: center;
            padding-left: 1rem;
            padding-right: 1rem;
            transition: justify-content 0.3s ease;
        }
        .sidebar-container:hover .sidebar-brand-row { justify-content: flex-start; }
        .sidebar-container .nav-label {
            opacity: 0;
            max-width: 0;
            overflow: hidden;
            transition: opacity 0.2s ease, max-width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-container:hover .nav-label {
            opacity: 1;
            max-width: 220px;
        }
        .sidebar-container nav a {
            justify-content: center;
            gap: 0;
            transition: gap 0.25s ease, justify-content 0.25s ease;
        }
        .sidebar-container:hover nav a {
            justify-content: flex-start;
            gap: 0.75rem;
        }
        .sidebar-container .mt-auto a.flex {
            justify-content: center;
            gap: 0;
        }
        .sidebar-container:hover .mt-auto a.flex {
            justify-content: flex-start;
            gap: 0.75rem;
        }
        .sidebar-container:not(:hover) .sidebar-logout-row {
            justify-content: center;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }
        .sidebar-container:hover .sidebar-logout-row {
            justify-content: flex-start;
        }
        .input-glass { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.12); transition: all 0.3s; color: white !important; }
        .input-glass:focus { background: rgba(255,255,255,0.08) !important; border-color: #1f68f9; outline: none; box-shadow: 0 0 16px rgba(31,104,249,0.18); }
        .input-readonly { background: rgba(255,255,255,0.02) !important; border: 1px solid rgba(255,255,255,0.05) !important; color: rgba(255,255,255,0.35) !important; cursor: not-allowed; }
        select.input-glass option { background: #0f172a; }
        .notify-success { background: linear-gradient(180deg,rgba(34,197,94,0.12),rgba(34,197,94,0.05)); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; }
        .notify-error { background: linear-gradient(180deg,rgba(244,63,94,0.12),rgba(244,63,94,0.05)); border: 1px solid rgba(244,63,94,0.2); color: #fb7185; }
        ::-webkit-scrollbar { width: 5px; display: none; }
    </style>
</head>
<body class="text-slate-100 font-display antialiased h-screen flex flex-col overflow-hidden">
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-blue-400 to-primary shrink-0"></div>
<div class="flex flex-1 overflow-hidden">

    <div th:replace="~{common/fragments :: adminSidebar('users')}"></div>

    <main class="flex-1 flex flex-col overflow-hidden bg-subtle-radial min-w-0">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10 bg-background-dark/30 premium-blur shrink-0">
            <div class="flex items-center gap-4">
                <a th:href="@{/admin/users}" class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
                    <span class="material-symbols-outlined text-slate-400">arrow_back</span>
                </a>
                <div>
                    <h2 class="text-xl font-black text-white">Edit User</h2>
                    <p class="text-[11px] uppercase tracking-[0.18em] text-slate-500 font-black mt-1">Modify Account Details</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs font-black text-white uppercase tracking-widest" th:text="${currentUser?.fullName} ?: 'Admin'">Admin</p>
                    <p class="text-[10px] text-primary font-bold uppercase tracking-tighter" th:text="${currentUser?.role} ?: 'ADMIN'">ADMIN</p>
                </div>
                <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-primary to-blue-400 p-[2px] shrink-0">
                    <div class="h-full w-full rounded-full overflow-hidden flex items-center justify-center bg-[#1e2535]">
                        <img th:if="${currentUser != null and currentUser.profilePicturePath != null}"
                             th:src="@{${currentUser.profilePicturePath}}"
                             class="h-full w-full object-cover rounded-full"
                             alt="Profile"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
                        <span th:class="${currentUser != null and currentUser.profilePicturePath != null} ? 'material-symbols-outlined text-white/70 text-2xl items-center justify-center h-full w-full hidden' : 'material-symbols-outlined text-white/70 text-2xl flex items-center justify-center h-full w-full'">
                            person
                        </span>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10">
            <div class="max-w-2xl mx-auto space-y-6">

                <!-- User Identity Card -->
                <div class="glass-card rounded-3xl p-7 flex items-center gap-6">
                    <div class="h-16 w-16 rounded-squircle bg-gradient-to-tr from-violet-500 to-purple-400 p-[2px] shrink-0">
                        <div class="h-full w-full rounded-squircle bg-slate-900 flex items-center justify-center">
                            <!-- Fixed: safe substring using Thymeleaf -->
                            <span class="text-lg font-black text-white"
                                  th:text="${user != null ? #strings.toUpperCase(#strings.substring(user.firstName,0,1)) + #strings.toUpperCase(#strings.substring(user.lastName,0,1)) : 'U'}">U</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-lg font-black text-white"
                           th:text="${user != null ? user.firstName + ' ' + user.lastName : 'User'}"></p>
                        <p class="text-sm text-slate-400 font-medium"
                           th:text="${user != null ? user.email : ''}"></p>
                        <div class="flex items-center gap-3 mt-2">
                            <span class="px-3 py-1 bg-violet-500/10 text-violet-400 text-[9px] font-black uppercase rounded-full border border-violet-500/20"
                                  th:text="${user != null ? user.role : 'USER'}"></span>
                            <!-- Fixed: compare against enum properly -->
                            <span th:classappend="${user != null and user.status.name() == 'ACTIVE'} ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20'"
                                  class="px-3 py-1 text-[9px] font-black uppercase rounded-full border"
                                  th:text="${user != null ? user.status : 'ACTIVE'}"></span>
                            <span class="text-[10px] text-slate-500 font-bold"
                                  th:text="${user != null ? 'ID: ' + user.id : 'ID: —'}"></span>
                        </div>
                    </div>
                </div>

                <!-- Flash messages from redirect -->
                <div th:if="${success != null}" class="notify-success px-4 py-4 rounded-2xl text-[13px] font-bold flex items-center gap-3">
                    <span class="material-symbols-outlined text-base shrink-0">check_circle</span>
                    <p th:text="${success}"></p>
                </div>
                <div th:if="${error != null}" class="notify-error px-4 py-4 rounded-2xl text-[13px] font-bold flex items-center gap-3">
                    <span class="material-symbols-outlined text-base shrink-0">error</span>
                    <p th:text="${error}"></p>
                </div>

                <!-- Edit Form -->
                <div class="glass-card rounded-[2.5rem] p-10">
                    <h3 class="text-lg font-black text-white mb-6">Account Information</h3>

                    <div id="formMsg" class="hidden mb-6 px-4 py-4 rounded-2xl text-[13px] font-bold flex items-center gap-3">
                        <span id="msgIcon" class="material-symbols-outlined text-base shrink-0">info</span>
                        <p id="msgText"></p>
                    </div>

                    <!-- Fixed: action points to /update not /edit, method POST -->
                    <form th:action="@{/admin/users/{id}/update(id=${user != null ? user.id : 0})}"
                          method="post" id="editForm" class="space-y-5" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">First Name</label>
                                <input type="text" id="fn" name="firstName"
                                       th:value="${user != null ? user.firstName : ''}"
                                       class="w-full h-14 rounded-2xl px-5 input-glass font-medium"/>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Last Name</label>
                                <input type="text" id="ln" name="lastName"
                                       th:value="${user != null ? user.lastName : ''}"
                                       class="w-full h-14 rounded-2xl px-5 input-glass font-medium"/>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">
                                Email Address
                                <span class="ml-2 text-[9px] font-black uppercase tracking-wider text-slate-500 bg-white/5 px-2 py-0.5 rounded-full">Read Only</span>
                            </label>
                            <!-- Hidden input submits the email value so it's never lost on save -->
                            <input type="hidden" name="email" th:value="${user != null ? user.email : ''}"/>
                            <input type="text"
                                   th:value="${user != null ? user.email : ''}"
                                   class="w-full h-14 rounded-2xl px-5 input-readonly font-medium" readonly/>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Phone Number</label>
                            <input type="tel" id="phone" name="phone"
                                   th:value="${user != null ? user.phone : ''}"
                                   class="w-full h-14 rounded-2xl px-5 input-glass font-medium"/>
                        </div>

                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Role</label>
                                <!-- Fixed: iterates real enum values, compares with enum name() -->
                                <select id="role" name="role"
                                        class="w-full h-14 rounded-2xl px-5 input-glass font-medium appearance-none cursor-pointer">
                                    <option th:each="r : ${allRoles}"
                                            th:value="${r.name()}"
                                            th:text="${r.name()}"
                                            th:selected="${user != null and user.role == r}"></option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-200 ml-1 mb-2">Status</label>
                                <!-- Fixed: iterates real enum values, compares with enum name() -->
                                <select id="status" name="status"
                                        class="w-full h-14 rounded-2xl px-5 input-glass font-medium appearance-none cursor-pointer">
                                    <option th:each="s : ${allStatuses}"
                                            th:value="${s.name()}"
                                            th:text="${s.name()}"
                                            th:selected="${user != null and user.status == s}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="flex gap-4 pt-2">
                            <button type="button" onclick="resetForm()"
                                    class="flex-1 h-14 bg-white/5 border border-white/10 text-slate-300 font-bold rounded-2xl hover:bg-white/10 transition-all">Reset</button>
                            <button type="submit"
                                    class="flex-1 h-14 bg-primary text-white font-black rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                Update User <span class="material-symbols-outlined text-lg">save</span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Reset Password -->
                <div class="glass-card rounded-[2.5rem] p-10">
                    <h3 class="text-lg font-black text-white mb-2">Reset Password</h3>
                    <p class="text-slate-400 text-sm font-medium mb-6">Send a password reset link to this user's email.</p>
                    <form th:action="@{/admin/users/{id}/reset-password(id=${user != null ? user.id : 0})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit"
                                class="flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 text-amber-400 font-black px-7 py-3.5 rounded-2xl hover:bg-amber-500/20 transition-all text-sm">
                            <span class="material-symbols-outlined text-lg">lock_reset</span>
                            Send Password Reset
                        </button>
                    </form>
                    <p th:if="${resetSent != null and resetSent}"
                       class="mt-4 text-xs text-emerald-400 font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">check_circle</span>
                        Reset link sent to <span th:text="${user != null ? user.email : ''}"></span>
                    </p>
                </div>

            </div>
        </div>
    </main>
</div>

<script>
    const original = {
        fn: /*[[${user != null ? user.firstName : ''}]]*/ '',
        ln: /*[[${user != null ? user.lastName : ''}]]*/ '',
        phone: /*[[${user != null ? user.phone : ''}]]*/ '',
        role: /*[[${user != null ? user.role.name() : 'USER'}]]*/ 'USER',
        status: /*[[${user != null ? user.status.name() : 'ACTIVE'}]]*/ 'ACTIVE'
    };

    function resetForm() {
        document.getElementById('fn').value = original.fn;
        document.getElementById('ln').value = original.ln;
        document.getElementById('phone').value = original.phone;
        document.getElementById('role').value = original.role;
        document.getElementById('status').value = original.status;
        document.getElementById('formMsg').classList.add('hidden');
    }

    function showMsg(type, text) {
        const m = document.getElementById('formMsg');
        m.className = `mb-6 px-4 py-4 rounded-2xl text-[13px] font-bold flex items-center gap-3 ${type === 'error' ? 'notify-error' : 'notify-success'}`;
        document.getElementById('msgIcon').textContent = type === 'error' ? 'error' : 'check_circle';
        document.getElementById('msgText').textContent = text;
        m.classList.remove('hidden');
    }

    document.getElementById('editForm').addEventListener('submit', e => {
        const fn = document.getElementById('fn').value.trim();
        const ln = document.getElementById('ln').value.trim();
        const phone = document.getElementById('phone').value.trim();
        if (!fn || !ln) { e.preventDefault(); showMsg('error', 'First and last name are required.'); return; }
        if (!phone) { e.preventDefault(); showMsg('error', 'Phone number is required.'); return; }
    });

    // Auto-dismiss flash messages after 4 seconds
    setTimeout(() => {
        document.querySelectorAll('.notify-success, .notify-error').forEach(el => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 4000);
</script>
</body>
</html>
