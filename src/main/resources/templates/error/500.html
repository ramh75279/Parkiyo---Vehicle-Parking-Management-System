<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Parkiyo | Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Public Sans', sans-serif; background-color: #020617; }</style>
</head>
<body class="text-slate-100 flex items-center justify-center min-h-screen">
<div class="text-center space-y-6 max-w-md px-6">
    <div class="text-6xl font-black text-rose-400">500</div>
    <h1 class="text-2xl font-black text-white" th:text="${errorTitle}">Server Error</h1>
    <p class="text-slate-400 font-medium" th:text="${errorMessage}">Something went wrong on our end.</p>
    <a href="/dashboard"
       class="inline-block mt-4 px-8 py-3 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-500 transition-all">
        Back to Dashboard
    </a>
</div>
</body>
</html>
